<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estética 2026 · Faculdade Inspirar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f3;
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --dark: #1a1714;
    --charcoal: #2e2a25;
    --mid: #6b6460;
    --accent: #8b4a6b;
    --accent2: #4a6b8b;
    --border: rgba(201,168,76,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,74,107,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(74,107,139,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.9s ease both;
  }

  .logo-wrap {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #000;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .logo-wrap img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    border-radius: 50%;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 500;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 900;
    line-height: 1.05;
    color: var(--warm-white);
    letter-spacing: -0.01em;
  }

  h1 span {
    color: var(--gold);
  }

  .subtitle {
    margin-top: 14px;
    font-size: 13px;
    color: var(--mid);
    letter-spacing: 0.05em;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px auto;
    max-width: 300px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* STUDENT CARD */
  .student-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s 0.2s ease both;
    backdrop-filter: blur(10px);
  }

  .student-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .student-info p:first-child {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }
  .student-info p:last-child {
    font-size: 15px;
    font-weight: 500;
    color: var(--warm-white);
    margin-top: 2px;
  }

  /* ADDRESS */
  .address-bar {
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s 0.3s ease both;
    flex-wrap: wrap;
  }

  .address-text {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .address-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .address-info p:first-child {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }
  .address-info p:last-child {
    font-size: 13px;
    color: var(--cream);
    margin-top: 2px;
  }

  .map-buttons {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-map {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    cursor: pointer;
  }

  .btn-maps {
    background: rgba(74,107,139,0.25);
    border: 1px solid rgba(74,107,139,0.4);
    color: #8ab4d4;
  }
  .btn-maps:hover {
    background: rgba(74,107,139,0.4);
    transform: translateY(-1px);
  }

  .btn-uber {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--cream);
  }
  .btn-uber:hover {
    background: rgba(255,255,255,0.14);
    transform: translateY(-1px);
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 20px;
    padding-left: 4px;
  }

  /* CLASSES LIST */
  .classes {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .class-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 16px;
    align-items: center;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .class-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .class-card:hover {
    background: rgba(255,255,255,0.055);
    border-color: rgba(201,168,76,0.2);
    transform: translateX(3px);
  }
  .class-card:hover::before { opacity: 1; }

  .class-card.past {
    opacity: 0.45;
  }

  .class-card.today {
    background: rgba(201,168,76,0.08);
    border-color: rgba(201,168,76,0.35);
  }
  .class-card.today::before { opacity: 1; background: var(--gold); }

  .class-card.next {
    background: rgba(139,74,107,0.08);
    border-color: rgba(139,74,107,0.25);
  }
  .class-card.next::before { opacity: 1; background: var(--accent); }

  /* DATE */
  .class-date {
    text-align: center;
  }
  .class-day {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--warm-white);
  }
  .class-month-year {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 3px;
  }

  /* TOPIC */
  .class-topic h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--warm-white);
    line-height: 1.4;
    margin-bottom: 5px;
  }
  .class-professor {
    font-size: 11px;
    color: var(--mid);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .class-professor::before {
    content: '';
    display: inline-block;
    width: 14px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  /* BADGE */
  .class-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-today {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
  }
  .badge-next {
    background: rgba(139,74,107,0.15);
    color: #d48ba8;
    border: 1px solid rgba(139,74,107,0.3);
  }
  .badge-past {
    background: rgba(255,255,255,0.05);
    color: var(--mid);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .badge-future {
    background: rgba(74,107,139,0.10);
    color: #8ab4d4;
    border: 1px solid rgba(74,107,139,0.2);
  }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 60px;
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.15em;
    animation: fadeUp 0.8s 0.6s ease both;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .class-card {
      grid-template-columns: 70px 1fr;
      grid-template-rows: auto auto;
    }
    .class-badge {
      grid-column: 2;
      justify-self: start;
    }
    .address-bar { flex-direction: column; align-items: flex-start; }
    .map-buttons { width: 100%; }
    .btn-map { flex: 1; justify-content: center; }
  }
</style>
</head>

  { date: "2026-04-18", topic: "Preenchimento Facial (malar, mandíbula, lábios) e Métodos de Anestesia. Intercorrências e tratamentos", professor: "Adriana Correia de Lima" },
  { date: "2026-05-23", topic: "Fios de Sustentação espiculados e lisos de PDO na Harmonização", professor: "Adriana Correia de Lima" },
  { date: "2026-06-20", topic: "Harmonização de Glúteos", professor: "Diuquéblea Inês da Silva Ismail" },
  { date: "2026-07-18", topic: "Bioestimuladores de Colágeno Facial e Corporal", professor: "Adriana Correia de Lima" },
  { date: "2026-08-22", topic: "Protocolos Faciais, Radiofrequência Fracionada, Jato de Plasma, Microagulhamento", professor: "Cleusa Cristine Vieira" },
  { date: "2026-09-19", topic: "Peelings Químicos", professor: "Cleusa Cristine Vieira" },
  { date: "2026-10-17", topic: "Recursos tecnológicos em estética nas estrias, flacidez tissular e muscular", professor: "Cleusa Cristine Vieira" },
  { date: "2026-11-14", topic: "Técnicas avançadas em estética nas lipodistrofias e PEFE", professor: "Fabiana Fagundes Audino" },
  { date: "2026-12-05", topic: "Fototerapia aplicada a estética – LED, laser e luz pulsada", professor: "Fabiana Fagundes Audino" },
  { date: "2027-01-23", topic: "Toxina Botulínica na Harmonização Facial e no tratamento da Hiperidrose axilar, palmar e plantar", professor: "Marco Aurélio Mori" },
  { date: "2027-02-20", topic: "Intradermoterapia facial e corporal associados a Prescrição de Ativos e Procedimentos Estéticos", professor: "Laiana Schneider – SC" },
];

const months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const weekdays = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

const today = new Date();
today.setHours(0,0,0,0);

const list = document.getElementById('classList');

let nextFound = false;

classes.forEach(c => {
  const d = new Date(c.date + 'T12:00:00');
  const isToday = d.getTime() === today.getTime();
  const isPast = d < today;
  const isNext = !isPast && !isToday && !nextFound;
  if (isNext) nextFound = true;

  const card = document.createElement('div');
  card.className = 'class-card' + (isPast ? ' past' : '') + (isToday ? ' today' : '') + (isNext ? ' next' : '');

  let badgeText = '', badgeClass = 'badge-future';
  if (isToday) { badgeText = '🔴 Hoje'; badgeClass = 'badge-today'; }
  else if (isNext) { badgeText = '→ Próxima'; badgeClass = 'badge-next'; }
  else if (isPast) { badgeText = 'Concluída'; badgeClass = 'badge-past'; }

  card.innerHTML = `
    <div class="class-date">
      <div class="class-day">${String(d.getDate()).padStart(2,'0')}</div>
      <div class="class-month-year">${months[d.getMonth()]} ${d.getFullYear()}</div>
    </div>
    <div class="class-topic">
      <h3>${c.topic}</h3>
      <div class="class-professor">${c.professor}</div>
    </div>
    ${badgeText ? `<span class="class-badge ${badgeClass}">${badgeText}</span>` : ''}
  `;

  list.appendChild(card);
});
</script>
